<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta name="googlebot" content="noindex">

    <!-- this page intentionally has no og properties to avoid embeds when sharing results -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Customizable Word Game</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <a href="/customizable_word_game/" id="link" hidden>Customizable Word Game</a>

    <script>
        const url = new URL(window.location.href);
        const target = "/customizable_word_game/" + url.search;
        const link = document.getElementById("link");

        window.location.replace(target);

        link.href = target;

        setTimeout(() => {
            link.hidden = false;
        }, 1000)
    </script>
</body>

</html>
