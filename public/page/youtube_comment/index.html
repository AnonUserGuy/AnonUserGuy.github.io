<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Google Takeout Youtube Comment Viewer</title>
    <link rel="stylesheet" href="/css/styles.css">

    <script src="/js/global.js"></script>
    <script type="module" src="./index.js"></script>
</head>

<body>
    <div>
        <a href="/">&lt-- go back</a>
    </div>

    <div class="section">
        <p>
            Upload all "comments.csv" files from a <a href="https://takeout.google.com/" target="_blank">Google Takeout</a> export to print them in a more human-readable format!
        </p>
        <p>
            <i>(Also works on "live chat.csv" files, but direct links to live chats don't work.)</i>
        </p>
        <p>
            <input type="checkbox" id="getInput" checked="true">
            <label for="getInput">Get usernames/video titles</label>
        </p>
        <p>
            <input id="uploadInput" type="file" accept=".csv, text/csv" multiple />
            <button id="resetInput">Clear Comments</button>
        </p>
        <div class="error" id="error" hidden></div>
    </div>

    <div class="section-timeline" id="commentsDiv" hidden></div>
</body>

</html>
