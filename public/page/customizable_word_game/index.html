    <title>Customizable Word Game</title>
    <link rel="stylesheet" href="/css/styles.css">

    <script src="/js/global.js"></script>
    <script type="module" src="./index.js"></script>
</head>

<body>
    <div>
        <a href="/">&lt-- go back</a>
    </div>

    <div class="section" id="formSection">
        <h2>Customizable Word Game</h2>
        <form id="form">
            <p><label for="formWidth">Word width: </label><input type="number" id="formWidth" name="w" min="0" max="18" value="5"></p>
            <p><label for="formLimit">Guess limit: </label><input type="number" id="formLimit" name="l" min="1" max="999" value="6"></p>
            <div class="selector">
                <p>
                    <input type="radio" id="formDifficultyNormal" name="d" value="normal" checked>
                    <label for="formDifficultyNormal">Normal</label>
                </p>
                <p>
                    <input type="radio" id="formDifficultyHard" name="d" value="hard">
                    <label for="formDifficultyHard">Hard</label>
                </p>
                <p>
                    <input type="radio" id="formDifficultyImpossible" name="d" value="impossible">
                    <label for="formDifficultyImpossible">Impossible!!!</label>
                </p>
            </div>
            
            <div class="selector">
                <p>
                    <input type="radio" id="formSeedDaily" name="seed" value="daily" checked>
                    <label for="formSeedDaily">Daily</label>
                </p>
                <p>
                    <input type="radio" id="formSeedRandom" name="seed" value="random">
                    <label for="formSeedRandom">Random</label>
                </p>
                <p>
                    <input type="radio" id="formSeedFixed" name="seed" value="fixed">
                    <label for="formSeedFixed"><input type="text" id="formSeedFixedValue" name="s" placeholder="Seed"></label>
                </p>
            </div>
            <p>
                <input type="submit" id="submit" value="Word Game me!">
            </p>
        </form>
    </div>

    <div id="wordSection" hidden>
        <div id="wordNotifications" class="word-notifications"></div>
        <div id="wordBoard" class="word-board"></div>
        <div id="wordKeyboard" class="word-keyboard"></div>
        <div id="wordButtons" class="word-buttons" hidden></div>
    </div>

</body>

</html>
